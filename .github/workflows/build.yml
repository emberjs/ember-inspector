name: Build and Publish
on:
  pull_request: {}
  push:
    branches:
      - main
      - stable
      - ember-2.7.0-3.4.0
      - ember-0.0.0-2.7.0
    tags:
      - v*
  schedule:
    - cron: '0 0 * * *'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Run tests
        run: pnpm test:ember

  ember-try:
    name: ember-try (${{ matrix.scenario }})
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - ember-lts-3.16
          - ember-lts-3.20
          - ember-lts-3.24
          - ember-lts-3.28
          - ember-lts-4.8
          - ember-lts-4.12
          - ember-lts-5.4
          - ember-lts-5.8
          - ember-lts-5.12
          - ember-release
          - ember-beta
          - ember-canary
          - ember-default-no-prototype-extensions

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Set NO_EXTEND_PROTOTYPES
        if: matrix.scenario == 'ember-default-no-prototype-extensions'
        run: echo "NO_EXTEND_PROTOTYPES==true" >> .GITHUB_ENV
      - name: Setup ember-try scenario
        working-directory: packages/ember-inspector
        run: pnpm exec ember try:one ${{ matrix.scenario }} --skip-cleanup --- cat package.json
      - name: Build
        working-directory: packages/ember-inspector
        run: pnpm exec ember build --environment test
      - name: Run test
        # Due to a bug in ember-cli, running `ember test` with `--path` doesn't set `EMBER_ENV=test`
        # See https://github.com/ember-cli/ember-cli/issues/8922
        working-directory: packages/ember-inspector
        run: EMBER_ENV=test pnpm exec ember test --path dist --filter="Ember Debug"

  build:
    name: Build extensions
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Download panes
        working-directory: packages/build
        run: pnpm panes:download
        env:
          EMBER_ENV: production
      - name: Update manifest.json (nightly)
        if: github.event_name == 'schedule'
        working-directory: packages/build
        run: |
          DATE="$(date +"%Y.%-m.%-d")"
          SHA="${GITHUB_SHA:0:7}"
          VERSION="$(jq -r '.version' package.json)"
          CONTENT="$(cat "$FILE")"

          echo "$CONTENT" | jq --arg date "$DATE" --arg sha "$SHA" --arg version "$VERSION" "$FILTER" > $FILE
          cat "$FILE"
        env:
          FILE: skeletons/web-extension/manifest.json
          FILTER: >-
            .name += " (Nightly)" |
            .version = $date |
            .version_name = "\($version) (nightly build \($date) / \($sha))"
      - name: Update manifest.json (pull request)
        if: github.event_name == 'pull_request'
        working-directory: packages/build
        run: |
          SHA="${SHA:0:7}"
          CONTENT="$(cat "$FILE")"

          echo "$CONTENT" | jq --arg pr "$PR" --arg sha "$SHA" "$FILTER" > $FILE
          cat "$FILE"
        env:
          FILE: skeletons/web-extension/manifest.json
          FILTER: >-
            .name += " (PR #\($pr))" |
            .version = $pr |
            .version_name = $sha
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
      - name: Update package.json (nightly)
        if: github.event_name == 'schedule'
        working-directory: packages/build
        run: |
          DATE="$(date +"%Y.%-m.%-d")"
          SHA="${GITHUB_SHA:0:7}"
          CONTENT="$(cat "$FILE")"

          echo "$CONTENT" | jq --arg date "$DATE" --arg sha "$SHA" "$FILTER" > $FILE
          cat "$FILE"
        env:
          FILE: package.json
          FILTER: .version += "-alpha.\($date)+\($sha)"
      - name: Update package.json (pull request)
        if: github.event_name == 'pull_request'
        working-directory: packages/build
        run: |
          SHA="${SHA:0:7}"
          CONTENT="$(cat "$FILE")"

          echo "$CONTENT" | jq --arg pr "$PR" --arg sha "$SHA" "$FILTER" > $FILE
          cat "$FILE"
        env:
          FILE: package.json
          FILTER: .version += "-alpha.0.\($pr)+\($sha)"
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
      - name: Set EMBER_INSPECTOR_TAB (nightly)
        if: github.event_name == 'schedule'
        run: echo "EMBER_INSPECTOR_TAB=Nightly" >> $GITHUB_ENV
      - name: Set EMBER_INSPECTOR_TAB (pull request)
        if: github.event_name == 'pull_request'
        run: echo "EMBER_INSPECTOR_TAB=PR \#$PR" >> $GITHUB_ENV
        env:
          PR: ${{ github.event.pull_request.number }}
      - name: Build
        run: pnpm build:production
      - name: Pack
        working-directory: packages/ember-inspector
        run: |
          VERSION="$(jq -r '.version' package.json)"

          pnpm pack
          mkdir -p dist/npm
          tar xvzf "ember-inspector-$VERSION.tgz" -C dist/npm --strip-components 1
      - name: Upload artifacts (bookmarklet)
        uses: actions/upload-artifact@v4
        with:
          name: bookmarklet
          path: packages/build/dist/bookmarklet
      - name: Upload artifacts (Chrome)
        uses: actions/upload-artifact@v4
        with:
          name: chrome
          path: packages/build/dist/chrome
      - name: Upload artifacts (Firefox)
        uses: actions/upload-artifact@v4
        with:
          name: firefox
          path: packages/build/dist/firefox
      - name: Upload artifacts (npm)
        uses: actions/upload-artifact@v4
        with:
          name: npm
          path: packages/build/dist/npm

  publish-chrome:
    name: Publish Chrome extension
    needs:
      - test
      - ember-try
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Set up node
        uses: actions/setup-node@v4
      - name: Install dependencies (chrome-webstore-upload-cli)
        run: npm install -g chrome-webstore-upload-cli
      - name: Download artifacts (Chrome)
        uses: actions/download-artifact@v4
        with:
          name: chrome
          path: chrome
      - name: Set Environment Variables
        run: |
          echo "EXTENSION_ID=ibdbkmdgflhglikhjdbogjjflkialpfi" >> $GITHUB_ENV
          echo "CLIENT_ID=${{ secrets.GOOGLE_NIGHTLY_CLIENT_ID }}" >> $GITHUB_ENV
          echo "CLIENT_SECRET=${{ secrets.GOOGLE_NIGHTLY_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "REFRESH_TOKEN=${{ secrets.GOOGLE_NIGHTLY_REFRESH_TOKEN }}" >> $GITHUB_ENV
      - name: Upload to Chrome Web Store
        if: >-
          github.event_name == 'schedule'
        run: chrome-webstore-upload upload --source chrome --auto-publish
