<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ember Inspector</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {{content-for "head"}}

    <link integrity="" rel="stylesheet" href="/@embroider/virtual/vendor.css">
    <link integrity="" rel="stylesheet" href="/@embroider/virtual/app.css">

    {{content-for "head-footer"}}
  </head>
  <body class="theme-light">
    {{content-for "body"}}

    <style>
      .half-and-half > * {
        position: relative;
      }

      .half-and-half {
        display: grid;
        grid-template-rows: 1fr 2fr;
        height: 100vh;
      }
    </style>

    <div class="half-and-half">
      <div id="test-ember-app">

      </div>
      <div id="ember-inspector"></div>
    </div>

    <script src="/@embroider/virtual/vendor.js"></script>
    <script type="module">
      import Application from './app/app';
      import environment from './app/config/environment';

      Application.create(environment.APP);

      import TestApplication from 'vite-test-app/app.js';

      TestApplication.create({
      rootElement: "#test-ember-app"
    })
    </script>

    {{content-for "body-footer"}}
  </body>
</html>
