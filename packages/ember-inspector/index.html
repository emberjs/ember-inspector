<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ember Inspector</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <link integrity="" rel="stylesheet" href="/@embroider/virtual/vendor.css">
    <link integrity="" rel="stylesheet" href="/@embroider/virtual/app.css">

    <script>
      // THIS is needed because of deep and painful sadness
      // we are glad that we figured this out, but many brain cells were lost on the way
      window.EmberENV = { _DEBUG_RENDER_TREE: true };
    </script>

    {{content-for "head-footer"}}

    <style>
      .half-and-half {
        display: grid;
        grid-template-rows: 1fr 2fr;
        height: 100vh;
      }

      .half-and-half > * {
        position: relative;
      }

      .half-and-half > * + * {
        border-top: 1px solid #ccc;
      }
    </style>
  </head>
  <body class="theme-light">
    {{content-for "body"}}

    <div class="half-and-half">
      <div id="test-ember-app"></div>
      <div id="ember-inspector"></div>
    </div>

    <script src="/@embroider/virtual/vendor.js"></script>

    <script type="module" src="./ember_debug_debug.mjs"></script>

    <script type="module">
      import TestApplication from 'vite-test-app/app.js';

      TestApplication.create({
        rootElement: "#test-ember-app",
      });

      import Application from './app/app';
      import environment from './app/config/environment';

      Application.create({
        ...environment.APP,
        rootElement: '#ember-inspector'
      });
    </script>

    {{content-for "body-footer"}}
  </body>
</html>
