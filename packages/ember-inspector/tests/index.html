<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EmberInspector Tests</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base href="../" />

    <script>
      // We need to set _DEBUG_RENDER_TREE before Ember source is loaded.
      // This is normally done by the extension and without this flag
      // the debug render tree is not populated at all.
      // Changes to the flag after Embers initial load are not supported.
      window.EmberENV ??= {};
      window.EmberENV._DEBUG_RENDER_TREE = true;
    </script>

    <style>
      .panels {
        display: grid;
        grid-template-rows: 1fr 3fr;
        height: 100vh;
        overflow: hidden;
      }

      .panel {
        position: relative;
        overflow: hidden;
      }

      * + .panel {
        border-top: 1px solid #ccc;
        overflow: auto;
      }
    </style>

    {{content-for "head"}}
    {{content-for "test-head"}}

    <link rel="stylesheet" href="/@embroider/virtual/vendor.css">
    <link rel="stylesheet" href="/@embroider/virtual/app.css">
    <link rel="stylesheet" href="/@embroider/virtual/test-support.css">

    {{content-for "head-footer"}}
    {{content-for "test-head-footer"}}
  </head>
  <body class="theme-light">

    {{content-for "body"}}
    {{content-for "test-body"}}

    <div id="qunit"></div>

    <div id="qunit-fixture">
      <div id="ember-testing-container" class="panels">
        <div class="panel" id="test-ember-app"></div>
        <div class="panel" id="ember-testing"></div>
      </div>
    </div>

    <script src="/testem.js" integrity="" data-embroider-ignore></script>
    <script src="/@embroider/virtual/vendor.js"></script>
    <script src="/@embroider/virtual/test-support.js"></script>

    <script type="module">
      import TestApplication from 'vite-test-app/app.js';

      TestApplication.create({
        rootElement: "#test-ember-app",
        location: 'none',
      });

      await import('ember-debug/debug-debug');
    </script>

    <script type="module">import "ember-testing";</script>
    <script type="module">
      import { start } from './test-helper';
      import.meta.glob("./**/*.{js,ts,gjs,gts}", { eager: true });
      start();
    </script>

    {{content-for "body-footer"}}
  </body>
</html>
